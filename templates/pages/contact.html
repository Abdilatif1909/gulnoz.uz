{% extends 'base.html' %}

{% block title %}Aloqa | Hududiy kooperatsiya{% endblock %}

{% block content %}
<section class="container">
    <div class="row g-4">
        <div class="col-lg-5">
            <h1 class="h2 fw-semibold mb-3">Aloqa</h1>
            <p class="text-muted">
                Platforma ma'muriyatiga xabar yuboring.
            </p>
        </div>
        <div class="col-lg-7">
            <form method="post" class="card border-0 shadow-sm">
                {% csrf_token %}
                <div class="card-body">
                    <div class="row g-3">
                        {% for field in form %}
                            <div class="{% if field.name == 'message' %}col-12{% else %}col-md-6{% endif %}">
                                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                                {{ field }}
                                {% for error in field.errors %}
                                    <div class="invalid-feedback d-block">{{ error }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="card-footer bg-white text-end">
                    <button type="submit" class="btn btn-primary">Xabar yuborish</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
